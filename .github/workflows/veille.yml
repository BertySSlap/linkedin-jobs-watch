name: veille-offres

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: veille-offres

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verification des offres
        env:
          COMPANY_ID: ${{ secrets.COMPANY_ID }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python3 checker.py

      - name: Sauvegarde de l'etat
        run: |
          git add etat.json
          if ! git diff --cached --quiet; then
            git config user.name "veille-bot"
            git config user.email "veille-bot@users.noreply.github.com"
            git commit -m "maj etat"
            git push
          fi
